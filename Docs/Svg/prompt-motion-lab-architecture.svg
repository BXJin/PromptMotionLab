  <text x="401" y="370" text-anchor="middle" class="box-title">Preset Layer</text>
  <text x="401" y="388" text-anchor="middle" class="small">emotion CSV</text>
  <text x="401" y="403" text-anchor="middle" class="small">lip_sync_mask</text>

  <rect x="474" y="330" width="122" height="82" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="535" y="352" text-anchor="middle" class="box-label">LipSync</text>
  <text x="535" y="370" text-anchor="middle" class="box-title">Viseme Layer</text>
  <text x="535" y="388" text-anchor="middle" class="small">Azure ID 0-21</text>
  <text x="535" y="403" text-anchor="middle" class="small">morph weights</text>

  <rect x="340" y="434" width="122" height="82" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="401" y="456" text-anchor="middle" class="box-label">Speech</text>
  <text x="401" y="474" text-anchor="middle" class="box-title">Playback</text>
  <text x="401" y="492" text-anchor="middle" class="small">sentence queue</text>
  <text x="401" y="507" text-anchor="middle" class="small">WAV download</text>

  <rect x="474" y="434" width="122" height="82" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="535" y="456" text-anchor="middle" class="box-label">Idle</text>
  <text x="535" y="474" text-anchor="middle" class="box-title">Blink / Micro</text>
  <text x="535" y="492" text-anchor="middle" class="small">speaking offset</text>
  <text x="535" y="507" text-anchor="middle" class="small">natural motion</text>

  <rect x="340" y="538" width="256" height="82" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="468" y="560" text-anchor="middle" class="box-label">Character Assets</text>
  <text x="468" y="578" text-anchor="middle" class="box-title">SkeletalMesh + Morph Targets</text>
  <text x="468" y="596" text-anchor="middle" class="small">Jaw_Open, V_Open, Mouth_Smile, Brow</text>
  <text x="468" y="611" text-anchor="middle" class="small">Config/PromptMotion CSV로 캐릭터별 튜닝</text>

  <rect x="340" y="642" width="256" height="70" rx="8" fill="#f8fafc" stroke="#c4b5fd" stroke-dasharray="5,3"/>
  <text x="468" y="664" text-anchor="middle" class="box-label">Debug / Metrics</text>
  <text x="468" y="682" text-anchor="middle" class="box-title">Face Debug Widget</text>
  <text x="468" y="699" text-anchor="middle" class="small">latency CSV, morph/viseme tuning</text>

  <rect x="340" y="736" width="256" height="58" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="468" y="758" text-anchor="middle" class="box-label">Execution Rule</text>
  <text x="468" y="776" text-anchor="middle" class="box-title">LLM은 의미, Unreal은 실행</text>

  <!-- FastAPI server -->
  <rect x="660" y="90" width="326" height="742" rx="12" fill="#f0fdf4" stroke="#15803d" stroke-width="1.6"/>
