  <text x="750" y="388" text-anchor="middle" class="box-title">Routing OpenAI</text>
  <text x="750" y="406" text-anchor="middle" class="small">mini / nano</text>
  <text x="750" y="421" text-anchor="middle" class="small">short route</text>

  <rect x="830" y="348" width="132" height="82" rx="8" fill="#ffffff" stroke="#86efac"/>
  <text x="896" y="370" text-anchor="middle" class="box-label">Fallback</text>
  <text x="896" y="388" text-anchor="middle" class="box-title">Mock / FastPath</text>
  <text x="896" y="406" text-anchor="middle" class="small">timeout safe</text>
  <text x="896" y="421" text-anchor="middle" class="small">debug emotion</text>

  <rect x="684" y="452" width="132" height="82" rx="8" fill="#ffffff" stroke="#86efac"/>
  <text x="750" y="474" text-anchor="middle" class="box-label">STT</text>
  <text x="750" y="492" text-anchor="middle" class="box-title">OpenAI / Azure</text>
  <text x="750" y="510" text-anchor="middle" class="small">transcribe</text>
  <text x="750" y="525" text-anchor="middle" class="small">streaming optional</text>

  <rect x="830" y="452" width="132" height="82" rx="8" fill="#ffffff" stroke="#86efac"/>
  <text x="896" y="474" text-anchor="middle" class="box-label">TTS</text>
  <text x="896" y="492" text-anchor="middle" class="box-title">Azure Speech</text>
  <text x="896" y="510" text-anchor="middle" class="small">WAV + viseme</text>
  <text x="896" y="525" text-anchor="middle" class="small">Mock if no key</text>

  <rect x="684" y="556" width="278" height="78" rx="8" fill="#ffffff" stroke="#86efac"/>
  <text x="823" y="578" text-anchor="middle" class="box-label">Speech Timeline</text>
  <text x="823" y="596" text-anchor="middle" class="box-title">audio URL + duration + visemes</text>
  <text x="823" y="614" text-anchor="middle" class="small">utteranceId, 0-21 viseme id, audio offset</text>

  <rect x="684" y="656" width="278" height="70" rx="8" fill="#f8fafc" stroke="#86efac" stroke-dasharray="5,3"/>
