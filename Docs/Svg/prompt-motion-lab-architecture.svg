  <rect x="1046" y="160" width="148" height="74" rx="8" fill="#ffffff" stroke="#fdba74"/>
  <text x="1120" y="182" text-anchor="middle" class="box-label">OpenAI</text>
  <text x="1120" y="200" text-anchor="middle" class="box-title">Behavior JSON</text>
  <text x="1120" y="217" text-anchor="middle" class="small">reply + intent</text>

  <rect x="1046" y="260" width="148" height="74" rx="8" fill="#ffffff" stroke="#fdba74"/>
  <text x="1120" y="282" text-anchor="middle" class="box-label">OpenAI STT</text>
  <text x="1120" y="300" text-anchor="middle" class="box-title">mini-transcribe</text>
  <text x="1120" y="317" text-anchor="middle" class="small">push-to-talk</text>

  <rect x="1046" y="360" width="148" height="74" rx="8" fill="#ffffff" stroke="#fdba74"/>
  <text x="1120" y="382" text-anchor="middle" class="box-label">Azure Speech</text>
  <text x="1120" y="400" text-anchor="middle" class="box-title">TTS + Viseme</text>
  <text x="1120" y="417" text-anchor="middle" class="small">audio offset</text>

  <rect x="1046" y="460" width="148" height="90" rx="8" fill="#fff7ed" stroke="#c2410c" stroke-dasharray="5,3"/>
  <text x="1120" y="482" text-anchor="middle" class="box-label">Later</text>
  <text x="1120" y="500" text-anchor="middle" class="box-title">ElevenLabs</text>
  <text x="1120" y="518" text-anchor="middle" class="small">better voice</text>
  <text x="1120" y="533" text-anchor="middle" class="small">separate lip-sync needed</text>

  <rect x="1046" y="576" width="148" height="90" rx="8" fill="#fff7ed" stroke="#c2410c" stroke-dasharray="5,3"/>
  <text x="1120" y="598" text-anchor="middle" class="box-label">Later</text>
  <text x="1120" y="616" text-anchor="middle" class="box-title">Audio2Face</text>
  <text x="1120" y="634" text-anchor="middle" class="small">audio-driven face</text>
  <text x="1120" y="649" text-anchor="middle" class="small">higher integration cost</text>

  <rect x="1046" y="692" width="148" height="72" rx="8" fill="#ffffff" stroke="#fdba74"/>
  <text x="1120" y="714" text-anchor="middle" class="box-label">Boundary</text>
  <text x="1120" y="732" text-anchor="middle" class="box-title">Provider Interface</text>
  <text x="1120" y="749" text-anchor="middle" class="small">swap without UE rewrite</text>

  <!-- Data flow arrows -->
  <path d="M276,186 L318,186" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="297" y="176" text-anchor="middle" font-size="9" fill="#2563eb">audio/text</text>

  <path d="M596,274 L660,194" stroke="#15803d" stroke-width="2.2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="626" y="223" text-anchor="middle" font-size="9" fill="#15803d">turn request</text>

  <path d="M660,214 L596,286" stroke="#15803d" stroke-width="1.7" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowGreen)"/>
