  <path d="M1028,213 L986,407" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowOrange)"/>

  <path d="M986,492 L1028,296" stroke="#c2410c" stroke-width="2.1" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="1008" y="390" text-anchor="middle" font-size="9" fill="#c2410c">STT</text>

  <path d="M986,492 L1028,396" stroke="#c2410c" stroke-width="2.1" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="1010" y="456" text-anchor="middle" font-size="9" fill="#c2410c">TTS</text>
  <path d="M1028,415 L986,594" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowOrange)"/>

  <path d="M468,620 L468,642" stroke="#7c3aed" stroke-width="1.8" fill="none" marker-end="url(#arrowPurple)"/>
  <path d="M401,412 L401,434" stroke="#7c3aed" stroke-width="1.8" fill="none" marker-end="url(#arrowPurple)"/>
  <path d="M535,516 L535,538" stroke="#7c3aed" stroke-width="1.8" fill="none" marker-end="url(#arrowPurple)"/>

  <!-- Bottom explanation -->
  <rect x="28" y="862" width="1184" height="70" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="620" y="886" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">핵심 설계 원칙</text>
  <text x="620" y="908" text-anchor="middle" class="small">LLM은 원시 morph나 bone 값을 만들지 않고, compact Behavior JSON만 결정한다.</text>
  <text x="620" y="924" text-anchor="middle" class="small">Unreal은 캐릭터별 CSV와 morph target layer를 사용해 표정, 립싱크, 눈깜빡임, 마이크로 표정을 실시간으로 합성한다.</text>
</svg>
