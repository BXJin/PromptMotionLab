  <text x="823" y="696" text-anchor="middle" class="box-title">timeouts, concurrency limits, metrics</text>
  <text x="823" y="713" text-anchor="middle" class="small">runtime_latency.csv / provider_failures.jsonl</text>

  <rect x="684" y="750" width="278" height="44" rx="8" fill="#f0fdf4" stroke="#15803d"/>
  <text x="823" y="778" text-anchor="middle" class="box-title">Pydantic Contracts + Local Session Store</text>

  <!-- External services -->
  <rect x="1028" y="90" width="184" height="742" rx="12" fill="#fff7ed" stroke="#c2410c" stroke-width="1.6"/>
  <rect x="1028" y="90" width="184" height="42" rx="12" fill="#9a3412"/>
  <rect x="1028" y="116" width="184" height="16" fill="#9a3412"/>
