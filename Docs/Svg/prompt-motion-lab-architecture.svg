  <text x="823" y="124" text-anchor="middle" fill="#dcfce7" font-size="10">Server-Python / localhost:8010</text>

  <rect x="684" y="154" width="278" height="72" rx="8" fill="#ffffff" stroke="#86efac"/>
  <text x="823" y="176" text-anchor="middle" class="box-label">Runtime API</text>
  <text x="823" y="194" text-anchor="middle" class="box-title">/api/runtime/turn/async</text>
  <text x="823" y="211" text-anchor="middle" class="small">reaction, responseReady, ttsReady polling</text>

  <rect x="684" y="248" width="278" height="78" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1.3"/>
