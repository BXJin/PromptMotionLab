  <rect x="318" y="90" width="300" height="42" rx="12" fill="#6d28d9"/>
  <rect x="318" y="116" width="300" height="16" fill="#6d28d9"/>
  <text x="468" y="108" text-anchor="middle" class="panel-title">Unreal Runtime Client</text>
  <text x="468" y="124" text-anchor="middle" fill="#ede9fe" font-size="10">PromptMotionRuntimeComponent / UE5 C++</text>

  <rect x="340" y="154" width="256" height="64" rx="8" fill="#ffffff" stroke="#c4b5fd"/>
  <text x="468" y="176" text-anchor="middle" class="box-label">Controller</text>
  <text x="468" y="194" text-anchor="middle" class="box-title">PromptMotionRuntimeComponent</text>
  <text x="468" y="210" text-anchor="middle" class="small">state, request, tick, target mesh</text>

  <rect x="340" y="240" width="256" height="68" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.3"/>
  <text x="468" y="262" text-anchor="middle" class="box-label">Realtime Transport</text>
  <text x="468" y="281" text-anchor="middle" class="box-title">Async Turn HTTP / WebSocket</text>
