  <text x="823" y="289" text-anchor="middle" class="box-title">RuntimeCharacterService</text>
  <text x="823" y="307" text-anchor="middle" class="small">reply + emotion + intent + gaze + gestureKey</text>

  <rect x="684" y="348" width="132" height="82" rx="8" fill="#ffffff" stroke="#86efac"/>
