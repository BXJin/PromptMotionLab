<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 960" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#15803d"/>
    </marker>
    <marker id="arrowOrange" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#c2410c"/>
    </marker>
    <marker id="arrowPurple" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#7c3aed"/>
    </marker>
    <style>
      .title { font-size: 24px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 12px; fill: #4b5563; }
      .panel-title { font-size: 14px; font-weight: 700; fill: #ffffff; }
      .panel-subtitle { font-size: 10px; fill: #dbeafe; }
      .box-title { font-size: 12px; font-weight: 700; fill: #111827; }
      .box-label { font-size: 10px; fill: #4b5563; }
      .small { font-size: 9px; fill: #6b7280; }
      .pill { font-size: 10px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1240" height="960" fill="#f6f8fb"/>
  <text x="620" y="36" text-anchor="middle" class="title">PromptMotionLab Runtime Architecture</text>
  <text x="620" y="58" text-anchor="middle" class="subtitle">저지연 대화형 3D 캐릭터: STT, LLM Behavior JSON, TTS, Viseme LipSync, Face Preset Layer</text>

  <!-- User and input -->
  <rect x="28" y="90" width="248" height="628" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
  <rect x="28" y="90" width="248" height="42" rx="12" fill="#1d4ed8"/>
  <rect x="28" y="116" width="248" height="16" fill="#1d4ed8"/>
  <text x="152" y="108" text-anchor="middle" class="panel-title">User Input</text>
  <text x="152" y="124" text-anchor="middle" class="panel-subtitle">Voice / Text / Scene Context</text>

  <rect x="48" y="154" width="208" height="62" rx="8" fill="#ffffff" stroke="#93c5fd"/>
  <text x="152" y="176" text-anchor="middle" class="box-label">Voice</text>
  <text x="152" y="194" text-anchor="middle" class="box-title">Push-to-Talk / VAD</text>
  <text x="152" y="209" text-anchor="middle" class="small">16kHz PCM, RMS threshold</text>

  <rect x="48" y="238" width="208" height="62" rx="8" fill="#ffffff" stroke="#93c5fd"/>
  <text x="152" y="260" text-anchor="middle" class="box-label">Text</text>
  <text x="152" y="278" text-anchor="middle" class="box-title">InputWidget</text>
  <text x="152" y="293" text-anchor="middle" class="small">manual prompt fallback</text>

  <rect x="48" y="322" width="208" height="78" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.3"/>
  <text x="152" y="344" text-anchor="middle" class="box-label">Listening Reaction</text>
  <text x="152" y="362" text-anchor="middle" class="box-title">Immediate Face Preset</text>
  <text x="152" y="379" text-anchor="middle" class="small">thinking / listening</text>
  <text x="152" y="393" text-anchor="middle" class="small">before final answer arrives</text>

  <rect x="48" y="424" width="208" height="82" rx="8" fill="#ffffff" stroke="#93c5fd"/>
  <text x="152" y="446" text-anchor="middle" class="box-label">Scene Context</text>
  <text x="152" y="464" text-anchor="middle" class="box-title">location / object</text>
  <text x="152" y="481" text-anchor="middle" class="small">focusedObjectId</text>
  <text x="152" y="496" text-anchor="middle" class="small">interactionMode</text>

  <rect x="48" y="530" width="208" height="86" rx="8" fill="#f8fafc" stroke="#93c5fd" stroke-dasharray="5,3"/>
  <text x="152" y="552" text-anchor="middle" class="box-label">Input Transport</text>
  <text x="152" y="570" text-anchor="middle" class="box-title">HTTP / WebSocket</text>
  <text x="152" y="588" text-anchor="middle" class="small">/api/runtime/stt/transcribe</text>
  <text x="152" y="603" text-anchor="middle" class="small">/ws/stt optional streaming</text>

  <rect x="48" y="640" width="208" height="52" rx="8" fill="#f8fafc" stroke="#93c5fd"/>
  <text x="152" y="662" text-anchor="middle" class="box-label">Fallback</text>
  <text x="152" y="680" text-anchor="middle" class="box-title">Text-only Runtime</text>

  <!-- Unreal client -->
